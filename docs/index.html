<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scratch Specification</title>
</head>
<body>
  <script src="scratchblocks-3.6.1-min.js"></script>
  
  <h1>
    Test
  </h1>
  
  <p>Hello, ScratchBlocks!</p>

  <pre class="blocks">
    when gf clicked
    move (10) steps
  </pre>

  <script>
    scratchblocks.renderMatching('pre.blocks', {
      style:     'scratch3',   // Optional, defaults to 'scratch2'.
      languages: ['en'],       // Optional, defaults to ['en'].
      scale: 1,                // Optional, defaults to 1
    });
  </script>
</body>
</html>
